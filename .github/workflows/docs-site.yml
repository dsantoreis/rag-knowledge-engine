name: docs-site
on:
  push:
    paths: ['docs-site/**', '.github/workflows/docs-site.yml']
  pull_request:
    paths: ['docs-site/**', '.github/workflows/docs-site.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
      - run: npm run build
